name: ticket-triage-env
version: "1.0.0"
description: >
  A single-step Reinforcement Learning environment for customer support ticket triage.
  The agent observes ticket features and assigns a priority level.
  Reward reflects correctness of priority classification.

entrypoint: env.ticket_env:TicketTriageEnv

tasks:
  - name: easy
    description: Simple issues like password reset or general queries
  - name: medium
    description: Moderate issues like billing or account problems
  - name: hard
    description: Complex issues like technical bugs or escalations

action_space:
  type: discrete
  values: [0, 1, 2]   # 0=Low, 1=Medium, 2=High

observation_space:
  type: box
  shape: [10]
  low: 0.0
  high: 1.0
  dtype: float32

reward_range: [0.0, 1.0]
max_steps_per_episode: 1